id: autobb-secrets-in-response

info:
  name: Cloud/Service Secrets Leaked in HTTP Response
  author: autobb
  severity: high
  description: >
    Scans any collected response body (HTML, JSON, JS, etc.) for high-signal
    secret formats: AWS access keys, Google API keys, Slack tokens/webhooks,
    Stripe live keys and PEM private keys. Deliberately excludes generic JWTs
    (too common/benign to be a reliable signal) to keep false positives low.
  tags: autobb,exposure,secrets,token

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        condition: or
        name: leaked-secret
        regex:
          - "AKIA[0-9A-Z]{16}"
          - "AIza[0-9A-Za-z\\-_]{35}"
          - "xox[baprs]-[0-9A-Za-z-]{10,48}"
          - "https://hooks\\.slack\\.com/services/T[0-9A-Za-z_]{8,}/B[0-9A-Za-z_]{8,}/[0-9A-Za-z_]{24}"
          - "sk_live_[0-9A-Za-z]{24,}"
          - "-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----"

    extractors:
      - type: regex
        part: body
        name: leaked-secret
        group: 0
        regex:
          - "AKIA[0-9A-Z]{16}"
          - "AIza[0-9A-Za-z\\-_]{35}"
          - "xox[baprs]-[0-9A-Za-z-]{10,48}"
          - "https://hooks\\.slack\\.com/services/T[0-9A-Za-z_]{8,}/B[0-9A-Za-z_]{8,}/[0-9A-Za-z_]{24}"
          - "sk_live_[0-9A-Za-z]{24,}"
          - "-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----"
