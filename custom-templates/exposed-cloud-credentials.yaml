id: autobb-exposed-cloud-credentials

info:
  name: Exposed Cloud/SSH/VCS Credential Files
  author: autobb
  severity: high
  description: >
    Detects common credential files left in the webroot: AWS CLI
    credentials, SSH private keys, git-credentials store and npm auth
    tokens. Each path requires its own distinctive content marker to
    avoid matching generic 200 catch-all pages.
  tags: autobb,exposure,credentials,misconfig

http:
  - method: GET
    path:
      - "{{BaseURL}}/.aws/credentials"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "aws_secret_access_key"
        case-insensitive: true

  - method: GET
    path:
      - "{{BaseURL}}/id_rsa"
      - "{{BaseURL}}/.ssh/id_rsa"
      - "{{BaseURL}}/id_rsa.bak"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "BEGIN OPENSSH PRIVATE KEY"
          - "BEGIN RSA PRIVATE KEY"
        condition: or

  - method: GET
    path:
      - "{{BaseURL}}/.git-credentials"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "https?://[^/\\s:]+:[^/\\s@]+@[^/\\s]+"

  - method: GET
    path:
      - "{{BaseURL}}/.npmrc"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "_authToken="
          - "_auth="
        condition: or
