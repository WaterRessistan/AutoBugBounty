id: autobb-graphql-introspection-enabled

info:
  name: GraphQL Introspection Enabled
  author: autobb
  severity: medium
  description: >
    Sends a real introspection query and only fires on a genuine schema
    response (__schema/queryType present), not just a 200 status on a
    GraphQL-looking path. Introspection exposes the full API schema
    (types, mutations, fields) to anyone, which is very useful attack
    surface for further testing.
  tags: autobb,graphql,exposure,misconfig

http:
  - method: POST
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"
      - "{{BaseURL}}/v1/graphql"
      - "{{BaseURL}}/graphql/console"
      - "{{BaseURL}}/gql"
    headers:
      Content-Type: application/json
    body: '{"query":"{__schema{queryType{name}}}"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        condition: and
        words:
          - "__schema"
          - "queryType"
