id: autobb-exposed-api-docs

info:
  name: Exposed Swagger/OpenAPI Documentation
  author: autobb
  severity: info
  description: >
    Detects publicly reachable Swagger/OpenAPI docs. Not a vulnerability by
    itself, but useful attack-surface recon (undocumented/internal endpoints,
    parameter names, auth schemes).
  tags: autobb,exposure,api,info

http:
  - method: GET
    path:
      - "{{BaseURL}}/swagger.json"
      - "{{BaseURL}}/swagger-ui.html"
      - "{{BaseURL}}/swagger/index.html"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/v2/api-docs"
      - "{{BaseURL}}/v3/api-docs"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        condition: or
        words:
          - "\"swagger\""
          - "\"openapi\""
          - "swagger-ui"
